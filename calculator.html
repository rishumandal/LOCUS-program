<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<body style="background-color: black; height: 100vh; display: flex; justify-content: center; align-items:center;">
    <main style="background-color: white; height: 50vh; width: 50vh;">
        <div style="height: 10vh; background-color: gray;" class="result-display"></div>
        <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; margin-top: 10px;">
            <button style="width: 80px; height: 70px;" onclick="handleTask(1)">1</button>
            <button style="width: 80px; height: 70px;" onclick="handleTask(2)">2</button>
            <button style="width: 80px; height: 70px;" onclick="handleTask(3)">3</button>
            <button style="width: 80px; height: 70px;" onclick="handleTask(4)">4</button>
            <button style="width: 80px; height: 70px;" onclick="handleTask(5)">5</button>
            <button style="width: 80px; height: 70px;" onclick="handleTask(6)">6</button>
            <button style="width: 80px; height: 70px;" onclick="handleTask(7)">7</button>
            <button style="width: 80px; height: 70px;" onclick="handleTask(8)">8</button>
            <button style="width: 80px; height: 70px;" onclick="handleTask(9)">9</button>
            <button style="width: 80px; height: 70px;" onclick="handleTask('+')">+</button>
            <button style="width: 80px; height: 70px;" onclick="handleTask('-')">-</button>
            <button style="width: 80px; height: 70px;" onclick="handleTask('=')">=</button>
            <button style="width: 80px; height: 30px;" onclick="handleTask('clear')">CLEAR</button>
        </div>
    </main>
</body>
</html>

<script>
    display = document.querySelector(".result-display").innerText 
    function handleTask(x){
        if(x == '='){
            if (display == ''){
                return
            }
            document.querySelector(".result-display").innerText = eval(display)
            console.log(eval(display), "is the answer.")
            display = ''
            return
        }

        if(x=='clear'){
            document.querySelector(".result-display").innerText = ''
            display = ''
            return
        }

        display = display + x
        document.querySelector(".result-display").innerText = display
    }
</script>
